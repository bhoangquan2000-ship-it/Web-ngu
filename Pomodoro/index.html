<!DOCTYPE html>
<html>
<head>
<title>Tôi là Tuất</title>

<style>

body{
font-family: Arial;
background:#121212;
color:white;
text-align:center;
padding-top:100px;
}

h1{
font-size:40px;
}

#timer{
font-size:60px;
margin:20px;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:5px;
}

.start{background:#4CAF50;color:white;}
.pause{background:#ff9800;color:white;}
.reset{background:#f44336;color:white;}

</style>
</head>

<body>

<h1>Pô mô đô rô ⏱</h1>

<div id="timer">25:00</div>

<p>Học 25 phút - Nghỉ 36 phút</p>

<button class="start" onclick="startTimer()">Sờ tát</button>
<button class="pause" onclick="pauseTimer()">Sì tóp</button>
<button class="reset" onclick="resetTimer()">SGPause</button>

<p>Số lần tích đức: <span id="sessions">0</span></p>

<script>

let time = 1500;
let timer = null;
let sessions = 0;

function updateDisplay(){
let minutes = Math.floor(time / 60);
let seconds = time % 60;

document.getElementById("timer").innerText =
String(minutes).padStart(2,"0") + ":" + String(seconds).padStart(2,"0");
}

function startTimer(){

if(timer !== null) return;

timer = setInterval(function(){

time--;

if(time <= 0){

clearInterval(timer);
timer = null;

sessions++;
document.getElementById("sessions").innerText = sessions;

alert("Focus session complete! Take a 5 minute break.");

time = 300;

}

updateDisplay();

},1000);

}

function pauseTimer(){

clearInterval(timer);
timer = null;

}

function resetTimer(){

clearInterval(timer);
timer = null;

time = 1500;
updateDisplay();

}

</script>

</body>
</html>
