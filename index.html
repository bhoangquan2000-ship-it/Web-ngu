<!DOCTYPE html>
<html>

<head>
<title>Pomodoro Timer</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family: "Segoe UI", Arial, sans-serif;
text-align:center;
margin-top:80px;
}

a{
color:#4da6ff;
font-size:18px;
}

#timer{
font-size:90px;
margin:40px 0;
letter-spacing:3px;
}

button{
padding:12px 25px;
margin:10px;
font-size:16px;
border:none;
border-radius:8px;
background:#4da6ff;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1f7ae0;
transform:scale(1.05);
}

#breakScreen{
margin-top:40px;
}

img{
margin:20px 0;
}

</style>

</head>

<body>

<p>
<a href="gioithieu.html" style="text-decoration:underline">
Giới thiệu cách học Pomodoro
</a>
</p>

<h1 id="timer">25:00</h1>

<div id="buttons">

<button onclick="startTimer()">Start</button>

<button onclick="resetTimer()">Reset</button>

<button onclick="skipTimer()">Skip</button>

</div>

<div id="breakScreen" style="display:none">

<h2>Break Time</h2>

<img src="celebrate.png" width="200">

<h2 id="breakTimer">10</h2>

<button onclick="skipBreak()">Skip quãng nghỉ</button>

</div>

<script>

let time = 1500
let timerInterval

function updateTimer(){

let minutes = Math.floor(time/60)
let seconds = time % 60

if(seconds < 10){
seconds = "0"+seconds
}

document.getElementById("timer").innerText =
minutes + ":" + seconds

}

function startTimer(){

timerInterval = setInterval(function(){

time--

updateTimer()

if(time <= 0){

clearInterval(timerInterval)
startBreak()

}

},1000)

}

function resetTimer(){

clearInterval(timerInterval)

time = 1500

updateTimer()

document.getElementById("breakScreen").style.display="none"
document.getElementById("buttons").style.display="block"
document.getElementById("timer").style.display="block"

}

function skipTimer(){

clearInterval(timerInterval)
startBreak()

}

function startBreak(){

document.getElementById("buttons").style.display="none"
document.getElementById("timer").style.display="none"

document.getElementById("breakScreen").style.display="block"

let breakTime = 10

let breakInterval = setInterval(function(){

breakTime--

document.getElementById("breakTimer").innerText = breakTime

if(breakTime <= 0){

clearInterval(breakInterval)
resetTimer()

}

},1000)

}

function skipBreak(){

resetTimer()

}

updateTimer()

</script>

</body>
</html>
